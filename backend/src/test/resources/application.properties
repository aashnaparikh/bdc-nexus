# ============================================================
# BDC-Nexus Test Configuration (H2 in-memory database)
# Overrides main application.properties during test execution
# ============================================================

# H2 in-memory datasource — no external PostgreSQL needed for tests
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Let Hibernate create/drop the schema around tests
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# Do NOT run schema.sql / data.sql in tests (Hibernate manages schema)
spring.sql.init.mode=never

# Suppress verbose SQL in test output
spring.jpa.show-sql=false
logging.level.org.hibernate.SQL=WARN
logging.level.com.bdcnexus=INFO
