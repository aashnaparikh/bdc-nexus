# ============================================================
# BDC-Nexus Backend - Application Configuration
# ============================================================

# --- Server ---
server.port=${PORT:8080}

# --- PostgreSQL Datasource ---
# Railway injects DATABASE_URL; fall back to local defaults for development.
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/bdcnexus}
spring.datasource.username=${DB_USERNAME:aashnaparikh}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver

# --- JPA / Hibernate ---
# Use 'none' so Hibernate does NOT auto-generate DDL.
# schema.sql controls the table structure explicitly.
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# --- SQL Initialization (schema.sql + data.sql) ---
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema.sql
spring.sql.init.data-locations=classpath:data.sql

# --- SpringDoc / Swagger ---
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.custom-css-url=/swagger-ui-custom.css
springdoc.swagger-ui.syntax-highlight.theme=obsidian

# --- CORS ---
# Override in Railway via env var CORS_ALLOWED_ORIGINS=https://your-app.vercel.app
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:5174,http://localhost:4173}

# --- Logging ---
logging.level.com.bdcnexus=DEBUG
logging.level.org.hibernate.SQL=DEBUG
