# ============================================================
# BDC-Nexus Backend - Application Configuration
# ============================================================

# --- Server ---
server.port=8080

# --- PostgreSQL Datasource ---
spring.datasource.url=jdbc:postgresql://localhost:5432/bdcnexus
spring.datasource.username=aashnaparikh
spring.datasource.password=
spring.datasource.driver-class-name=org.postgresql.Driver

# --- JPA / Hibernate ---
# Use 'none' so Hibernate does NOT auto-generate DDL.
# schema.sql controls the table structure explicitly.
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# --- SQL Initialization (schema.sql + data.sql) ---
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema.sql
spring.sql.init.data-locations=classpath:data.sql

# --- SpringDoc / Swagger ---
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.custom-css-url=/swagger-ui-custom.css
springdoc.swagger-ui.syntax-highlight.theme=obsidian

# --- Logging ---
logging.level.com.bdcnexus=DEBUG
logging.level.org.hibernate.SQL=DEBUG
