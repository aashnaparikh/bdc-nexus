name: BDC-Nexus CI Pipeline

# Trigger on every push to any branch and on PRs targeting main.
# This enforces quality gates at the feature branch level, not just at merge time.
on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main, develop]

jobs:
  # =====================================================================
  # Job 1: Backend — JUnit 5 tests + Maven build
  # =====================================================================
  backend-test:
    name: Backend — JUnit 5 Tests & Build
    runs-on: ubuntu-latest

    # Spin up a real PostgreSQL service container.
    # This validates that schema.sql is compatible with actual PostgreSQL syntax.
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: bdcnexus_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up Java 21 (Eclipse Temurin)
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Run JUnit 5 unit tests
        working-directory: backend
        # Unit tests use H2 in-memory DB (test application.properties).
        # The postgres service above is available for future integration tests.
        run: mvn test --no-transfer-progress
        env:
          SPRING_DATASOURCE_URL: jdbc:h2:mem:testdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
          SPRING_DATASOURCE_DRIVER_CLASS_NAME: org.h2.Driver
          SPRING_JPA_HIBERNATE_DDL_AUTO: create-drop

      - name: Build production JAR (skip tests — already ran above)
        working-directory: backend
        run: mvn package -DskipTests --no-transfer-progress

      - name: Upload backend JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: bdc-nexus-backend-jar
          path: backend/target/bdc-nexus-backend-*.jar
          retention-days: 7

  # =====================================================================
  # Job 2: Frontend — Jest tests + Vite production build
  # Runs in parallel with backend-test (no 'needs:' dependency)
  # =====================================================================
  frontend-test:
    name: Frontend — Jest Tests & Vite Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up Node.js 20 LTS
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install npm dependencies
        working-directory: frontend
        run: npm ci

      - name: Run Jest tests
        working-directory: frontend
        run: npm test -- --watchAll=false --passWithNoTests --forceExit

      - name: Build production frontend bundle
        working-directory: frontend
        run: npm run build

      - name: Upload frontend dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: bdc-nexus-frontend-dist
          path: frontend/dist/
          retention-days: 7

  # =====================================================================
  # Job 3: Summary — runs after both jobs complete successfully
  # =====================================================================
  ci-summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-test]
    if: always()

    steps:
      - name: Report CI status
        run: |
          echo "========================================"
          echo "  BDC-Nexus CI Pipeline — Summary"
          echo "========================================"
          echo "Backend tests: ${{ needs.backend-test.result }}"
          echo "Frontend tests: ${{ needs.frontend-test.result }}"
          echo ""
          if [[ "${{ needs.backend-test.result }}" == "success" && "${{ needs.frontend-test.result }}" == "success" ]]; then
            echo "✅ All checks passed — ready for review / merge"
          else
            echo "❌ One or more checks failed — review logs above"
            exit 1
          fi
