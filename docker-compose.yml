version: '3.8'

# ============================================================
# BDC-Nexus — Local Development Stack
# Starts: PostgreSQL 16 + Spring Boot backend
# Usage:  docker compose up --build
#         Frontend: npm run dev (from frontend/)
# ============================================================

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: bdcnexus
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: backend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: jdbc:postgresql://postgres:5432/bdcnexus
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      # Override this in production via env var — must be 32+ characters
      JWT_SECRET: dev-only-secret-key-do-not-use-in-production-replace-me
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
